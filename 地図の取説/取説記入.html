<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取説記入</title>
<link rel="stylesheet" href="../help/help.css">
<script src="../data.js"></script>
<script src="../help/help-engine.js"></script>
<script src="取説設定.js"></script>
<style>
body { background: #151515; color: #f5f5f5; }
header {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: #222; border-bottom: 2px solid #ffe26a;
}
h1 { font-size: 20px; margin: 0; color: #ffe26a; }
main {
  display: grid;
  grid-template-columns: minmax(420px, 1fr) minmax(360px, 0.9fr);
  gap: 16px; padding: 16px;
}
@media (max-width: 900px) { main { grid-template-columns: 1fr; } }
.panel {
  background: #222; border: 1px solid #444; border-radius: 12px; padding: 14px;
}
.row {
  display: grid; grid-template-columns: 120px 1fr; gap: 10px;
  align-items: start; margin: 8px 0;
}
label { color: #ccc; font-size: 13px; padding-top: 8px; }
input, textarea {
  width: 100%; background: #111; color: #fff;
  border: 1px solid #555; border-radius: 6px; padding: 8px;
  font-family: inherit; font-size: 14px;
}
textarea { min-height: 70px; resize: vertical; }
button, .linkbtn {
  border: 0; border-radius: 8px; padding: 9px 12px;
  font-weight: bold; cursor: pointer; color: #111; background: #ffe26a;
  text-decoration: none; display: inline-block;
}
button.sub { background: #444; color: #fff; }
.toolbar { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.item {
  border: 1px solid #444; border-radius: 10px; padding: 12px;
  margin: 12px 0; background: #1b1b1b;
}
.item-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;
}
.item-title { color: #ffe26a; font-weight: bold; margin-right: auto; }
.item-id { color: #888; font-size: 12px; }
.item-mark { flex-shrink: 0; }
.preview { background: #171717; border-radius: 12px; padding: 14px; }
.help-note {
  color: #aaa; font-size: 13px; line-height: 1.6; margin: 8px 0 14px;
}
.auto-title {
  font-size: 18px; color: #ffe26a; margin: 4px 0 12px; font-weight: bold;
}
.disabled-item { opacity: 0.45; pointer-events: none; }
</style>
</head>
<body>
<header>
  <h1>取説記入</h1>
  <div class="toolbar">
    <a class="linkbtn" href="取説表示.html" target="_blank">プレビュー</a>
    <button onclick="downloadConfig()">取説設定.jsを書き出し</button>
  </div>
</header>

<main>
  <section class="panel">
    <h2>自動設定（data.js から）</h2>
    <p class="help-note">
      タイトルと表示項目は <code>data.js</code> を読んで自動決まります。<br>
      ここでは<strong>説明文だけ</strong>を記入してください。
    </p>
    <div class="auto-title" id="autoTitle"></div>
    <div class="feature-tags" id="featureTags"></div>

    <h2>説明項目</h2>
    <div id="stepsEditor"></div>

    <h2>補足説明（iPad など）</h2>
    <div id="notesEditor"></div>
    <button class="sub" onclick="addNote()">補足を追加</button>

    <h2>最後の注意書き</h2>
    <textarea id="footer" oninput="syncFooter(); renderPreview();"></textarea>
  </section>

  <section class="panel">
    <h2>表示プレビュー</h2>
    <div class="preview" id="preview"></div>
  </section>
</main>

<script>
var state = structuredClone(window.HELP_USER || { texts: {}, notes: [], footer: '' });
if (!state.texts) state.texts = {};
if (!Array.isArray(state.notes)) state.notes = [];

var builtCfg = HelpEngine.buildHelpConfig(window.APP_DATA, state);

function init() {
  document.getElementById('footer').value = state.footer || '';
  document.getElementById('autoTitle').textContent = builtCfg.title;
  renderFeatureTags();
  renderEditors();
  renderPreview();
}

function renderFeatureTags() {
  var f = builtCfg.features || {};
  var tags = [
    { label: '地図ピン', on: true },
    { label: '見回し', on: true },
    { label: '矢印移動', on: f.hasRoute },
    { label: '脇道', on: f.hasSideBranch },
    { label: '自動再生', on: f.hasRoute },
    { label: 'ガイド動画', on: f.hasGuideVideo },
    { label: '虫眼鏡', on: f.hasHiResPeek },
    { label: 'VR戻る', on: f.hasHiResPeek },
    { label: '地図ボタン', on: true }
  ];
  document.getElementById('featureTags').innerHTML = tags.map(function(t) {
    return '<span class="feature-tag ' + (t.on ? 'on' : 'off') + '">' + t.label + (t.on ? '' : '（なし）') + '</span>';
  }).join('');
}

function activeStepIds() {
  return (builtCfg.steps || []).map(function(s) { return s.id; });
}

function renderEditors() {
  var catalog = HelpEngine.getStepCatalog();
  var ids = activeStepIds();
  document.getElementById('stepsEditor').innerHTML = ids.map(function(id) {
    var def = catalog[id];
    if (!def) return '';
    var txt = state.texts[id] || {};
    var mark = HelpEngine.renderStepMark({
      id: id,
      markType: def.markType,
      imageSrc: def.imageSrc,
      blink: def.blink,
      magnifierColor: builtCfg.features.magnifierColor,
      markIcon: def.markIcon
    });
    return '<div class="item">' +
      '<div class="item-head">' +
      '<span class="item-mark">' + mark + '</span>' +
      '<span class="item-title">' + esc(def.defaultTitle) + '</span>' +
      '<span class="item-id">' + esc(id) + '</span>' +
      '</div>' +
      field('見出し', 'step-title-' + id, txt.title || '', "updateText('" + id + "','title',this.value)") +
      textarea('本文', 'step-body-' + id, txt.body || '', "updateText('" + id + "','body',this.value)") +
      '<p class="help-note">例文を作品に合わせて書き換えてください。</p>' +
      '</div>';
  }).join('');

  document.getElementById('notesEditor').innerHTML = state.notes.map(function(note, idx) {
    return '<div class="item">' +
      '<div class="item-head"><span class="item-title">補足 ' + (idx + 1) + '</span>' +
      '<button class="sub" onclick="removeNote(' + idx + ')">削除</button></div>' +
      field('見出し', 'note-title-' + idx, note.title || '', "updateNote(" + idx + ",'title',this.value)") +
      textarea('本文', 'note-body-' + idx, note.body || '', "updateNote(" + idx + ",'body',this.value)") +
      textarea('小さい補足', 'note-tip-' + idx, note.tip || '', "updateNote(" + idx + ",'tip',this.value)") +
      '</div>';
  }).join('');
}

function field(label, id, value, handler) {
  return '<div class="row"><label>' + esc(label) + '</label><input id="' + id + '" value="' + escAttr(value) + '" oninput="' + handler + '"></div>';
}
function textarea(label, id, value, handler) {
  return '<div class="row"><label>' + esc(label) + '</label><textarea id="' + id + '" oninput="' + handler + '">' + esc(value) + '</textarea></div>';
}

function updateText(id, key, value) {
  if (!state.texts[id]) state.texts[id] = {};
  state.texts[id][key] = value;
  renderPreview();
}
function updateNote(idx, key, value) {
  state.notes[idx][key] = value;
  renderPreview();
}
function syncFooter() {
  state.footer = document.getElementById('footer').value;
}
function addNote() {
  state.notes.push({ title: '補足', body: '', tip: '' });
  renderEditors();
  renderPreview();
}
function removeNote(idx) {
  state.notes.splice(idx, 1);
  renderEditors();
  renderPreview();
}

function renderPreview() {
  syncFooter();
  builtCfg = HelpEngine.buildHelpConfig(window.APP_DATA, state);
  document.getElementById('autoTitle').textContent = builtCfg.title;
  HelpEngine.renderHelpPage(document.getElementById('preview'), builtCfg);
}

function downloadConfig() {
  syncFooter();
  var text = '// ============================================================\n' +
    '// 取説 — 説明文の記入用（作品ごとにここだけ編集）\n' +
    '// タイトル・表示項目は data.js から自動決定されます。\n' +
    '// ============================================================\n' +
    'window.HELP_USER = ' + JSON.stringify(state, null, 2) + ';\n';
  var blob = new Blob([text], { type: 'text/javascript' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '取説設定.js';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
  });
}
function escAttr(value) { return esc(value).replace(/`/g, '&#96;'); }

init();
</script>
</body>
</html>
