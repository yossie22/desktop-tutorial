<!DOCTYPE html>
<html lang="ja">
<head>
<title>VRツアーマップ</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="data.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
.map-container {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.map-stage {
  position: relative;
  width: 100%;
  height: 100%;
  line-height: 0;
}
.map-image {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: fill;
}
.map-overlay { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.map-overlay > * { pointer-events: auto; }
.overlay-text { position: absolute; z-index: 5; pointer-events: none; }
.main-title { font-size: clamp(28px, 5vw, 57px); color: #80ffff; font-weight: bold; font-family: 'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS PMincho',serif; text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.76); line-height: 1.25; text-align: left; }
.desc-text { font-size: clamp(16px, 2.5vw, 29px); color: #ffff00; font-family: 'Meiryo',sans-serif; white-space: pre-wrap; line-height: 1.7; text-align: left; }
.map-pin { position: absolute; transform: translate(-50%, -100%); cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
.map-pin:hover, .map-pin:active { transform: translate(-50%, -100%) scale(1.15); }
.pin-icon { width: 36px; height: 36px; border: 3px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 3px 8px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
.pin-number { transform: rotate(45deg); font-size: 14px; font-weight: bold; color: white; line-height: 1; }
.pin-label { background: rgba(255,255,255,0.95); color: #333; font-size: 13px; font-weight: bold; padding: 3px 7px; border-radius: 4px; white-space: nowrap; line-height: 1.2; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,0.4); margin-bottom: 4px; pointer-events: none; font-family: sans-serif; }
.help-button { position: absolute; right: 14px; top: 14px; z-index: 50; background: rgba(255,226,106,0.94); color: #111; font-weight: bold; font-size: 15px; text-decoration: none; padding: 9px 14px; border-radius: 999px; box-shadow: 0 3px 12px rgba(0,0,0,0.45); font-family: sans-serif; }
.landscape-hint{
  position: fixed;
  right: 82px;
  bottom: 22px;
  z-index: 99998;
  color: #80ffff;
  font-weight: bold;
  font-size: 14px;
  font-family: Meiryo,sans-serif;
  text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 18px rgba(0,0,0,0.75), 0 0 18px rgba(128,255,255,0.25);
  pointer-events: none;
  opacity: 0.95;
  animation: landscapeHintPulse 1.6s ease-in-out infinite;
}
@keyframes landscapeHintPulse {
  0%, 100% { opacity: 0.55; filter: brightness(1.0); }
  50% { opacity: 1; filter: brightness(1.35); }
}
@media (orientation: landscape) {
  .landscape-hint { display: none !important; }
}
.map-portal { position: absolute; z-index: 40; width: 52px; height: 52px; transform: translate(-100%, -100%); transform-origin: 100% 100%; transition: width 0.32s ease, height 0.32s ease; cursor: pointer; pointer-events: auto; }
.map-portal.is-open { width: min(34%, 260px); height: min(34%, 260px); }
.map-portal-caption { position: absolute; top: -17px; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 11px; font-weight: bold; font-family: Meiryo,sans-serif; text-shadow: 0 0 6px rgba(0,0,0,0.95); white-space: nowrap; pointer-events: none; opacity: 1; line-height: 1.2; }
.map-portal-label { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 15px; font-weight: bold; font-family: Meiryo,sans-serif; text-shadow: 0 0 8px rgba(0,0,0,0.95); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; }
.map-portal.is-open .map-portal-label { opacity: 1; }
.map-portal.is-open .map-portal-caption { opacity: 0; }
.map-portal-ring { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; position: relative; border: 3px solid rgba(255,190,225,0.9); box-shadow: 0 0 16px rgba(255,120,200,0.7), 0 0 32px rgba(255,90,180,0.4); background: #1a1020; }
.map-portal.is-open .map-portal-ring { overflow: visible; }
@media (hover: hover) { .map-portal:hover .map-portal-ring { overflow: visible; } .map-portal:hover .map-portal-pin { opacity: 1; visibility: visible; pointer-events: auto; } }
.map-portal-mark, .map-portal-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; transition: opacity 0.28s ease; }
.map-portal-map { opacity: 0; }
@media (hover: none), (pointer: coarse) { .map-portal .map-portal-mark { opacity: 1 !important; } .map-portal.is-open .map-portal-mark { opacity: 0 !important; } .map-portal.is-open .map-portal-map { opacity: 1 !important; } }
.map-portal-pin { position: absolute; transform: translate(-50%, -100%); opacity: 0; visibility: hidden; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: opacity 0.22s ease, visibility 0.22s ease; }
.map-portal.is-open .map-portal-pin { opacity: 1; visibility: visible; pointer-events: auto; }
.map-portal-pin .pin-icon { width: 30px; height: 30px; }
.map-portal-pin .pin-number { font-size: 12px; }
.map-portal-pin .pin-label { font-size: 11px; padding: 2px 6px; margin-bottom: 3px; }
@media (hover: none), (pointer: coarse), (max-width: 1024px) {
  #mapPortal.map-portal { position: fixed !important; left: auto !important; top: auto !important; right: 12px !important; bottom: 16px !important; width: 52px !important; height: 52px !important; transform: none !important; -webkit-transform: none !important; z-index: 99999 !important; visibility: visible !important; opacity: 1 !important; display: block !important; pointer-events: auto !important; }
  #mapPortal.map-portal.is-open { width: min(34vw, 260px) !important; height: min(34vw, 260px) !important; }
  #mapPortal.map-portal:not(.is-open) .map-portal-pin { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
  #mapPortal.map-portal.is-open .map-portal-pin { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; z-index: 10 !important; }
}
</style>
</head>
<body>
<div class="map-container">
  <div class="map-stage" id="mapStage">
    <img src="map.jpg" alt="地図" class="map-image" id="mapImage">
    <div class="map-overlay" id="mapOverlay">
      <a class="help-button" href="help/使い方.html">？使い方</a>
      <div class="landscape-hint" aria-hidden="true">スマホは横位置</div>
      <div class="overlay-text main-title" id="tourTitle" style="width:min(92%,900px);padding:8px;left:2%;top:3%;"></div>
      <div class="overlay-text desc-text" id="tourDesc" style="width:min(92%,900px);padding:8px;left:24%;top:79%;"></div>
    </div>
  </div>
</div>
<div class="map-portal is-fixed" id="mapPortal" style="position:fixed;right:12px;bottom:16px;width:52px;height:52px;z-index:99999;transform:none;-webkit-transform:none;visibility:visible;opacity:1;display:block;">
  <div class="map-portal-caption" id="mapPortalCaption">ポータル</div>
  <div class="map-portal-label" id="mapPortalLabel">ポータル先</div>
  <div class="map-portal-ring">
    <img class="map-portal-mark" id="mapPortalMark" src="portal.png" alt="">
    <img class="map-portal-map" id="mapPortalMap" src="map_portal.jpg" alt="">
    <div class="map-portal-pin" id="mapPortalPin"></div>
  </div>
</div>
<script>
var TOUR_TITLE = (typeof APP_DATA !== 'undefined' && APP_DATA.tourTitle) ? APP_DATA.tourTitle : 'VRツアー';
var TOUR_DESC = (typeof APP_DATA !== 'undefined' && APP_DATA.tourDescription) ? APP_DATA.tourDescription : '';
document.getElementById('tourTitle').textContent = TOUR_TITLE;
document.getElementById('tourDesc').textContent = TOUR_DESC;

// GPS範囲：map.jpg の左上＝topLeft、右下＝bottomRight に対応させる
// map.jpg (1217×703) の比率 ≈ 1.73 と、この範囲の比率は一致しています
var MAP_BOUNDS = { topLeft: { lat: 33.52093, lng: 131.217184 }, bottomRight: { lat: 33.520168, lng: 131.218755 } };
var MAP_INSETS = { left: 0, top: 0, right: 0, bottom: 0 };
var MAP_PIN_OFFSET = { x: 0, y: 0 };
var MAP_TWO_POINT = null;
function mercatorY(lat) { var r = lat * Math.PI / 180; return Math.log(Math.tan(Math.PI / 4 + r / 2)); }
function gpsToPercent(lat, lng) {
  var x, y, bounds = MAP_BOUNDS, tp = MAP_TWO_POINT;
  if (tp && tp.p1 && tp.p2) {
    var p1 = tp.p1, p2 = tp.p2;
    x = Math.abs(p2.lng - p1.lng) > 1e-12 ? p1.x + (lng - p1.lng) / (p2.lng - p1.lng) * (p2.x - p1.x) : p1.x;
    var y1 = mercatorY(p1.lat), y2 = mercatorY(p2.lat), ym = mercatorY(lat);
    if (Math.abs(y2 - y1) > 1e-12) { var s1 = p1.y / 100, s2 = p2.y / 100, sm = (ym - y1) / (y2 - y1); y = (s1 + sm * (s2 - s1)) * 100; } else { y = p1.y; }
  } else {
    var lngSpan = bounds.bottomRight.lng - bounds.topLeft.lng;
    var yTop = mercatorY(bounds.topLeft.lat), yBot = mercatorY(bounds.bottomRight.lat);
    x = lngSpan ? (lng - bounds.topLeft.lng) / lngSpan * 100 : 0;
    y = (yTop - yBot) ? (yTop - mercatorY(lat)) / (yTop - yBot) * 100 : 0;
  }
  var il = MAP_INSETS.left || 0, it = MAP_INSETS.top || 0, ir = MAP_INSETS.right || 0, ib = MAP_INSETS.bottom || 0;
  x = il + x * (100 - il - ir) / 100;
  y = it + y * (100 - it - ib) / 100;
  x += (MAP_PIN_OFFSET.x || 0); y += (MAP_PIN_OFFSET.y || 0);
  return { x: x, y: y };
}
var MAP_PORTAL = null;
if (typeof APP_DATA !== 'undefined' && APP_DATA.mapConfig && APP_DATA.mapConfig.portal && APP_DATA.mapConfig.portal.sceneId) {
  var mp = APP_DATA.mapConfig.portal;
  MAP_PORTAL = {
    label: mp.label || 'ポータル先',
    shortLabel: mp.shortLabel || 'ポータル',
    markImage: mp.markImage || 'portal.png',
    mapImage: mp.mapImage || 'map_portal.jpg',
    fullMapPage: mp.fullMapPage || 'map_portal.html',
    sceneId: mp.sceneId,
    pinName: mp.pinName || '',
    pinColor: mp.pinColor || '#00cc44',
    pinX: mp.pinX != null ? mp.pinX : 51,
    pinY: mp.pinY != null ? mp.pinY : 74,
    mapOffsetX: 0, mapOffsetY: 0,
    anchorX: 97, anchorY: 82,
    phoneAnchorX: 97, phoneAnchorY: 82
  };
}
function goToPortalScene(sceneId) {
  var sid = sceneId || (MAP_PORTAL && MAP_PORTAL.sceneId);
  if (!sid) return;
  var url = './viewer.html?id=' + encodeURIComponent(sid);
  if (SIDE_BRANCHES.length > 0) url += '&sideBranches=' + encodeURIComponent(JSON.stringify(SIDE_BRANCHES));
  url += '&back=' + encodeURIComponent('index.html');
  window.location.href = url;
}
function goToPortalMap() {
  if (!MAP_PORTAL || !MAP_PORTAL.fullMapPage) return;
  window.location.href = './' + MAP_PORTAL.fullMapPage;
}
function getPortalPinPos() {
  var p = MAP_PORTAL;
  return { x: (parseFloat(p.pinX) || 0) + (parseFloat(p.mapOffsetX) || 0), y: (parseFloat(p.pinY) || 0) + (parseFloat(p.mapOffsetY) || 0) };
}
function pinPercentThroughObjectFitCover(pinX, pinY, imageAR) {
  if (!imageAR || !isFinite(imageAR) || imageAR <= 0) return { x: pinX, y: pinY };
  var px = pinX / 100, py = pinY / 100, dx, dy;
  if (imageAR >= 1) { var visW = 1 / imageAR, offX = (1 - visW) / 2; dx = (px - offX) / visW; dy = py; }
  else { var visH = imageAR, offY = (1 - visH) / 2; dx = px; dy = (py - offY) / visH; }
  return { x: Math.max(0, Math.min(100, dx * 100)), y: Math.max(0, Math.min(100, dy * 100)) };
}
function getPortalMapImageAspect() {
  var el = document.getElementById('mapPortalMap');
  if (!el || !el.naturalWidth) return 1;
  return el.naturalWidth / el.naturalHeight;
}
function layoutMapPortalPin() {
  var pinEl = document.getElementById('mapPortalPin');
  if (!pinEl) return;
  var pos = getPortalPinPos();
  var display = pinPercentThroughObjectFitCover(pos.x, pos.y, getPortalMapImageAspect());
  pinEl.style.left = display.x + '%';
  pinEl.style.top = display.y + '%';
}
function bindMapPortalLongPress(portalEl) {
  if (!portalEl || portalEl._portalLongPressBound) return;
  portalEl._portalLongPressBound = true;
  var HOLD_MS = 600, MOVE_TOL = 18, timer = null, moved = false, sx = 0, sy = 0, startMs = 0;
  function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }
  function onDown(cx, cy) {
    moved = false;
    portalEl._portalLongFired = false;
    sx = cx; sy = cy;
    startMs = Date.now();
    clearTimer();
    timer = setTimeout(function() {
      if (moved) return;
      portalEl._portalLongFired = true;
      goToPortalMap();
    }, HOLD_MS);
  }
  function onMove(cx, cy) {
    if (moved) return;
    if (Math.hypot(cx - sx, cy - sy) > MOVE_TOL) { moved = true; clearTimer(); }
  }
  function onUp() {
    var held = Date.now() - startMs;
    clearTimer();
    if (!moved && held >= HOLD_MS && !portalEl._portalLongFired) {
      portalEl._portalLongFired = true;
      goToPortalMap();
    }
  }
  portalEl.addEventListener('touchstart', function(e) {
    if (!e.touches || !e.touches.length) return;
    e.preventDefault();
    onDown(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  portalEl.addEventListener('touchmove', function(e) {
    if (!e.touches || !e.touches.length) return;
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  portalEl.addEventListener('touchend', onUp, { passive: true });
  portalEl.addEventListener('touchcancel', onUp, { passive: true });
  portalEl.addEventListener('mousedown', function(e) { if (e.button !== 0) return; onDown(e.clientX, e.clientY); });
  portalEl.addEventListener('mousemove', function(e) { if (e.buttons !== 1) return; onMove(e.clientX, e.clientY); });
  portalEl.addEventListener('mouseup', onUp);
  portalEl.addEventListener('mouseleave', onUp);
}
function isAppleMobileOrTablet() {
  var ua = navigator.userAgent || '';
  if (/iPad|iPhone|iPod/i.test(ua)) return true;
  if (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return true;
  return false;
}
function isMapTouchUI() {
  if (isAppleMobileOrTablet()) return true;
  if ('ontouchstart' in window) return true;
  if (navigator.maxTouchPoints > 0) return true;
  return window.matchMedia && window.matchMedia('(hover: none)').matches;
}
function applyMapPortalFixedStyle(el) {
  if (!el) return;
  var open = el.classList.contains('is-open');
  var sz = open ? Math.min((window.innerWidth || 390) * 0.34, 260) : 52;
  el.style.cssText = 'position:fixed;left:auto;top:auto;right:12px;bottom:16px;width:' + sz + 'px;height:' + sz + 'px;transform:none;-webkit-transform:none;z-index:99999;visibility:visible;opacity:1;display:block;pointer-events:auto;';
}
function layoutMapPortal() {
  var el = document.getElementById('mapPortal');
  if (!el || !MAP_PORTAL) return;
  if (isMapTouchUI()) {
    if (el.parentNode !== document.body) document.body.appendChild(el);
    el.classList.add('is-fixed');
    applyMapPortalFixedStyle(el);
    return;
  }
  var container = document.getElementById('mapStage');
  if (container && el.parentNode !== container) container.appendChild(el);
  el.classList.remove('is-fixed');
  el.style.cssText = '';
  el.style.left = '97%';
  el.style.top = '82%';
  el.style.transform = 'translate3d(-100%, -100%, 0)';
}
function initMapPortal() {
  if (!MAP_PORTAL || !MAP_PORTAL.sceneId) {
    var hide = document.getElementById('mapPortal');
    if (hide) hide.style.display = 'none';
    return;
  }
  var portalEl = document.getElementById('mapPortal');
  if (!portalEl) return;
  var markEl = document.getElementById('mapPortalMark');
  var mapEl = document.getElementById('mapPortalMap');
  var pinEl = document.getElementById('mapPortalPin');
  var captionEl = document.getElementById('mapPortalCaption');
  var labelEl = document.getElementById('mapPortalLabel');
  if (captionEl) captionEl.textContent = MAP_PORTAL.shortLabel || 'ポータル';
  if (labelEl) labelEl.textContent = MAP_PORTAL.label || 'ポータル先';
  if (markEl && MAP_PORTAL.markImage) markEl.src = MAP_PORTAL.markImage;
  if (mapEl && MAP_PORTAL.mapImage) {
    mapEl.onload = layoutMapPortalPin;
    mapEl.src = MAP_PORTAL.mapImage;
  }
  if (pinEl) {
    pinEl.innerHTML = '<div class="pin-label">' + (MAP_PORTAL.pinName || '') + '</div><div class="pin-icon" style="background:' + (MAP_PORTAL.pinColor || '#00cc44') + ';"><span class="pin-number">P</span></div>';
    layoutMapPortalPin();
    pinEl.addEventListener('click', function(e) { e.stopPropagation(); goToPortalScene(); });
  }
  layoutMapPortal();
  bindMapPortalLongPress(portalEl);
  if (isMapTouchUI() && !portalEl._touchClickBound) {
    portalEl._touchClickBound = true;
    portalEl.addEventListener('click', function(e) {
      if (portalEl._portalLongFired) {
        portalEl._portalLongFired = false;
        e.preventDefault();
        e.stopPropagation();
        return;
      }
      if (e.target.closest && e.target.closest('.map-portal-pin')) return;
      portalEl.classList.toggle('is-open');
      layoutMapPortal();
      layoutMapPortalPin();
      setTimeout(layoutMapPortalPin, 80);
      e.stopPropagation();
    });
    document.addEventListener('click', function(e) {
      if (e.target.closest && e.target.closest('.map-portal')) return;
      portalEl.classList.remove('is-open');
      layoutMapPortal();
      layoutMapPortalPin();
    });
  }
}
var PINS = [

  // Pin #1: スモークツリー (aa - sceneId: 0-aa001)
  { lat: 33.520345, lng: 131.21794, name: 'スモークツリー', sceneId: '0-aa001', color: '#e8453c' },

  // Pin #2: アジサイ (aa - sceneId: 1-aa002)
  { lat: 33.520525, lng: 131.21764, name: 'アジサイ', sceneId: '1-aa002', color: '#00ff40' }
];

var SIDE_BRANCHES = [];

function spreadPinPositions(pins) {
  var positions = pins.map(function(pin) { return { pin: pin, pos: gpsToPercent(pin.lat, pin.lng) }; });
  var groups = {};
  positions.forEach(function(item, i) {
    var k = item.pin.lat.toFixed(6) + ',' + item.pin.lng.toFixed(6);
    if (!groups[k]) groups[k] = [];
    groups[k].push(i);
  });
  Object.keys(groups).forEach(function(k) {
    var idxs = groups[k];
    if (idxs.length <= 1) return;
    var r = 1.8;
    idxs.forEach(function(pi, j) {
      var a = (2 * Math.PI * j) / idxs.length - Math.PI / 2;
      positions[pi].pos.x += Math.cos(a) * r;
      positions[pi].pos.y += Math.sin(a) * r;
    });
  });
  positions.forEach(function(item) {
    item.pos.x += parseFloat(item.pin.mapOffsetX || 0) || 0;
    item.pos.y += parseFloat(item.pin.mapOffsetY || 0) || 0;
  });
  return positions;
}

function goToScene(pin) {
  var url = './viewer.html?id=' + pin.sceneId;
  if (pin.flip) url += '&flip=1';
  if (SIDE_BRANCHES.length > 0) {
    url += '&sideBranches=' + encodeURIComponent(JSON.stringify(SIDE_BRANCHES));
  }
  url += '&back=' + encodeURIComponent('index.html');
  window.location.href = url;
}

function renderPins() {
  var overlay = document.getElementById('mapOverlay');
  overlay.querySelectorAll('.map-pin').forEach(function(el) { el.remove(); });
  var spread = spreadPinPositions(PINS);
  spread.forEach(function(item, i) {
    var el = document.createElement('div');
    el.className = 'map-pin';
    el.style.left = item.pos.x + '%';
    el.style.top = item.pos.y + '%';
    el.setAttribute('data-idx', i);
    el.innerHTML = '<div class="pin-label">' + item.pin.name + '</div><div class="pin-icon" style="background:' + item.pin.color + ';"><span class="pin-number">' + (i+1) + '</span></div>';
    el.addEventListener('click', function() { goToScene(PINS[parseInt(this.getAttribute('data-idx'))]); });
    overlay.appendChild(el);
  });
}

var mapImage = document.getElementById('mapImage');
function onMapReady() { renderPins(); }
if (mapImage.complete && mapImage.naturalWidth) onMapReady();
else mapImage.addEventListener('load', onMapReady);

if (!TOUR_DESC) {
  document.getElementById('tourDesc').textContent = TOUR_TITLE + 'が現れます。';
}
initMapPortal();
window.addEventListener('load', function() { layoutMapPortal(); layoutMapPortalPin(); });
window.addEventListener('pageshow', function() { layoutMapPortal(); layoutMapPortalPin(); });
window.addEventListener('orientationchange', function() { setTimeout(function() { layoutMapPortal(); layoutMapPortalPin(); }, 120); });
</script>
</body>
</html>
